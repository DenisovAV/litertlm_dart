name: litertlm_dart
description: >-
  Pure Dart runtime for Google's LiteRT-LM: FFI bindings, engine/conversation
  lifecycle, and streaming on-device LLM inference. No Flutter dependency.
version: 0.1.1
repository: https://github.com/DenisovAV/litertlm_dart
issue_tracker: https://github.com/DenisovAV/litertlm_dart/issues
topics:
  - llm
  - ffi
  - on-device
  - litert
  - gemma

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  ffi: ^2.1.0
  meta: ^1.15.0
  mutex: ^3.1.0
  # Native Assets build hook (hook/build.dart owns the libLiteRtLm bundle:
  # fetches per-platform prebuilts from the GitHub release, SHA256-verified).
  hooks: ^2.0.0
  code_assets: ^1.2.0
  crypto: ^3.0.6

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
