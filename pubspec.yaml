name: litertlm_dart
description: >-
  Pure Dart runtime for Google's LiteRT-LM: FFI bindings, engine and
  conversation lifecycle, and streaming on-device LLM inference. No Flutter
  dependency — usable from CLI, server, and Flutter (via adapters).
version: 0.0.1
repository: https://github.com/DenisovAV/litertlm_dart

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  ffi: ^2.1.0
  mutex: ^3.1.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
