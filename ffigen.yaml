# Regenerates lib/src/bindings/litert_lm_bindings.dart from the LiteRT-LM C API
# header. Run: dart run ffigen (needs LLVM/libclang installed).
#
# The bindings are checked in (so consumers don't need libclang), but this
# config keeps them regenerable from native/litert_lm/include/engine.h instead
# of hand-maintained — a header change means re-running ffigen, not editing
# generated Dart.
name: LiteRtLmBindings
description: Dart FFI bindings to Google's LiteRT-LM C API.
output: 'lib/src/bindings/litert_lm_bindings.dart'
headers:
  entry-points:
    - 'native/litert_lm/include/engine.h'
  include-directives:
    - 'native/litert_lm/include/engine.h'
functions:
  include:
    - 'LiteRtLm.*'
structs:
  include:
    - 'LiteRtLm.*'
enums:
  include:
    - 'LiteRtLm.*'
comments:
  style: any
  length: full
preamble: |
  // AUTO-GENERATED by ffigen - DO NOT EDIT
  // Source: native/litert_lm/include/engine.h
